name: Sync freedomofmoney to public repo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/freedomofmoney/**'
      - 'app/api/freedomofmoney/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to public repo
        env:
          PUBLIC_REPO: Moya-2025-Moya/-U-X-Freedom-of-Money
          PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${PAT}@github.com/${PUBLIC_REPO}.git public-repo

          mkdir -p public-repo/app/freedomofmoney
          mkdir -p public-repo/app/api/freedomofmoney

          rsync -av --delete \
            --exclude='PLAN.md' \
            --exclude='PUBLIC_README.md' \
            app/freedomofmoney/      public-repo/app/freedomofmoney/

          rsync -av --delete app/api/freedomofmoney/  public-repo/app/api/freedomofmoney/

          cp app/freedomofmoney/PUBLIC_README.md public-repo/README.md

          cd public-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
